name: 🌐 Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare site content
        run: |
          # Copy alerts data into web/ for deployment
          mkdir -p web/data
          if [ -f data/alerts.json ]; then
            cp data/alerts.json web/data/alerts.json
          else
            echo '{"alerts":[],"summary":{"total":0,"high":0,"medium":0,"low":0},"scanTime":"never","ecosystems":{}}' > web/data/alerts.json
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web/'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
