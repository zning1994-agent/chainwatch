name: 🔍 Supply Chain Security Scanner

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - 'data/**'

permissions:
  contents: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: 🔍 Run supply chain scan
        id: scan
        run: |
          echo "Starting supply chain security scan..."
          
          # Run scanner and save full output
          node scripts/scan-malicious.js 2>&1 | tee scan-output.txt
          
          # Extract JSON from output (skip header lines)
          sed -n '/^{/,/^}/p' scan-output.txt > data/alerts.json
          
          # Verify JSON is valid
          if ! node -e "JSON.parse(require('fs').readFileSync('data/alerts.json','utf8'))" 2>/dev/null; then
            echo "⚠️ JSON extraction failed, using raw output"
            # Fallback: redirect only the JSON part
            node -e "
              const {execSync} = require('child_process');
              const out = execSync('node scripts/scan-malicious.js').toString();
              const jsonStart = out.indexOf('{');
              const jsonEnd = out.lastIndexOf('}') + 1;
              if (jsonStart >= 0 && jsonEnd > jsonStart) {
                require('fs').writeFileSync('data/alerts.json', out.slice(jsonStart, jsonEnd));
              }
            "
          fi
          
          # Count results
          HIGH=$(node -e "const d=require('./data/alerts.json'); console.log(d.summary?.high || 0)")
          MEDIUM=$(node -e "const d=require('./data/alerts.json'); console.log(d.summary?.medium || 0)")
          TOTAL=$(node -e "const d=require('./data/alerts.json'); console.log(d.alerts?.length || 0)")
          
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      
      - name: 📝 Create/Update GitHub Issue
        if: steps.scan.outputs.total != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alerts = JSON.parse(fs.readFileSync('data/alerts.json', 'utf8'));
            
            const high = alerts.summary?.high || 0;
            const medium = alerts.summary?.medium || 0;
            const total = alerts.alerts?.length || 0;
            
            const date = new Date().toISOString().split('T')[0];
            
            let body = `## 🔍 Daily Supply Chain Security Report\n\n`;
            body += `**Date:** ${date}\n`;
            body += `**Scan Results:** ${total} alerts found\n\n`;
            body += `### Summary\n`;
            body += `| Risk Level | Count |\n`;
            body += `|-----------|-------|\n`;
            body += `| 🔴 HIGH | ${high} |\n`;
            body += `| 🟡 MEDIUM | ${medium} |\n\n`;
            
            if (alerts.alerts && alerts.alerts.length > 0) {
              body += `### Alerts\n\n`;
              for (const alert of alerts.alerts.slice(0, 20)) {
                const icon = alert.level === 'HIGH' ? '🔴' : alert.level === 'MEDIUM' ? '🟡' : '🔵';
                body += `- ${icon} **${alert.package}** (${alert.ecosystem}): ${alert.message}\n`;
              }
              if (alerts.alerts.length > 20) {
                body += `\n*...and ${alerts.alerts.length - 20} more alerts*\n`;
              }
            }
            
            body += `\n---\n*Generated by [ChainWatch](https://github.com/zning1994-agent/chainwatch) supply chain scanner*`;
            
            // Find existing issue or create new one
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'supply-chain-alert',
              per_page: 1
            });
            
            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
              core.info(`Updated issue #${issues.data[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔍 Supply Chain Security Report - ${date}`,
                body: body,
                labels: ['supply-chain-alert']
              });
              core.info('Created new issue');
            }
      
      - name: 🌐 Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/master'
